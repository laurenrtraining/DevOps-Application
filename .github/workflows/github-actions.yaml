name: Social Societies CI/CD Pipeline
run-name: CI/CD pipeline functionality for Social Societies Web Application
on: 
  push:
    branches: [main, initiate-pipeline]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Pre-deployment processes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

        # Setup Python
      - name: Python init
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

        # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

        # Run prettier
      - name: Run prettier for formatting
        run: |
          npm install --save-dev prettier
          npx prettier --check .
        
        # Run linting for python
      - name: Run linting for python
        run: |
          pip install flake8
          flake8 .

        # Run Security Scanning
      - name: Test with Pytest
        run: |
          pip install bandit
          bandit -r .

        # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r src/requirements.txt
        
        # Run pytest
      - name: Test with Pytest
        run: |
          pip install pytest pytest-cov
          pytest src/tests/

      
          

